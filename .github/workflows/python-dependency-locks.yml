name: Python Dependency Locks

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  dependency-locks:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # actions/checkout v5.0.1

      - name: Install development dependencies
        uses: validityBase/vbase-github-actions/.github/actions/setup-python-deps@v1
        with:
          requirements-files: |
            requirements-dev.txt
          python-version: "3.11"
          require-hashes: "true"

      - name: Verify generated lock files are current
        run: |
          pip-compile --strip-extras --generate-hashes -o requirements.txt requirements.in
          pip-compile --strip-extras --allow-unsafe --generate-hashes -o requirements-dev.txt requirements-dev.in
          git diff --exit-code -- requirements.txt requirements-dev.txt

      - name: Install package locally
        run: python -m pip install --no-deps --no-build-isolation -e .

      - name: Check installed dependencies
        run: python -m pip check
