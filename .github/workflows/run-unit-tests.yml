name: Run Unit Tests

on:
  push:
    branches: ["**"]

permissions:
  contents: read

jobs:
  run-unit-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # actions/checkout v5.0.1

      - name: Install dependencies
        uses: validityBase/vbase-github-actions/.github/actions/setup-python-deps@v1
        with:
          requirements-files: |
            requirements-dev.txt
          python-version: "3.11"

      - name: Run unit tests
        run: |
          python -m unittest discover -s tests
